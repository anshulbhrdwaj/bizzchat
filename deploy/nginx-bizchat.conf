# ====================================
# BizChat — bizchat.anyflix.fun
# ====================================

# Rate limiting zone (define in nginx.conf http block if not already)
# limit_req_zone $binary_remote_addr zone=bizchat_api:10m rate=30r/m;

# ---- HTTP → HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name bizchat.anyflix.fun;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS main server ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bizchat.anyflix.fun;

    # SSL — filled in by certbot
    ssl_certificate     /etc/letsencrypt/live/bizchat.anyflix.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bizchat.anyflix.fun/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # --- Upload size limit ---
    client_max_body_size 15M;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ---- API: proxy to Node.js on :4001 ----
    location /api/ {
        # limit_req zone=bizchat_api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- Socket.io: WebSocket proxy ----
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering    off;
    }

    # ---- Uploads: proxy to Node for auth checks ----
    location /uploads/ {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache uploaded files for 7 days
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ---- Frontend SPA: serve static files ----
    root /home/lonewolf/apps/bizchat/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff2|woff)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ---- Health check ----
    location /health {
        proxy_pass http://127.0.0.1:4001;
        access_log off;
    }

    # ---- Block hidden files ----
    location ~ /\. {
        deny all;
        return 404;
    }
}
